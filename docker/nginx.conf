# 盾甲 WAF Nginx 配置
# 运行于容器内，监听 80 端口

user www-data;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml application/json application/javascript application/rss+xml application/atom+xml image/svg+xml;

    # 安全头（由 PHP WAF 处理，这里仅做基础补充）
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server {
        listen 80 default_server;
        listen [::]:80 default_server;
        server_name _;
        root /var/www/html;
        index index.php;

        # 最大请求体
        client_max_body_size 10M;

        # 健康检查端点（无需认证）
        location = /waf-health {
            default_type application/json;
            return 200 '{"status":"healthy","version":"3.0.0"}';
            access_log off;
        }

        # 禁止访问敏感文件
        location ~ /\. {
            deny all;
            access_log off;
            log_not_found off;
        }
        location ~ ^/(logs|data|\.env|\.env\.example|\.htaccess|Dockerfile|docker-compose\.yml) {
            deny all;
            access_log off;
            log_not_found off;
        }
        location ~ /src/Support/homoglyph_map\.json {
            deny all;
        }

        # WAF 仪表盘和 API 路由
        location ~ ^/(waf-dashboard|waf-dashboard-api|waf-scanner-api|waf-dashboard-bot|waf-sandbox-api|waf-password-api) {
            try_files $uri $uri/ /index.php?$query_string;
        }

        # PHP 文件处理（通过 WAF 入口）
        location ~ \.php$ {
            try_files $uri =404;
            fastcgi_pass 127.0.0.1:9000;
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
            include fastcgi_params;

            # WAF 关键：传递真实 IP
            fastcgi_param HTTP_X_REAL_IP $remote_addr;
            fastcgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
            fastcgi_param HTTP_X_FORWARDED_PROTO $scheme;

            # WAF 环境变量传递
            fastcgi_param WAF_MAGIC_KEY $WAF_MAGIC_KEY if_not_empty;
            fastcgi_param WAF_2FA_PASS $WAF_2FA_PASS if_not_empty;
            fastcgi_param WAF_WEBHOOK_URL $WAF_WEBHOOK_URL if_not_empty;
            fastcgi_param WAF_TRUST_CF_IP $WAF_TRUST_CF_IP if_not_empty;
            fastcgi_param WAF_BOT_VERIFY_DNS $WAF_BOT_VERIFY_DNS if_not_empty;
        }

        # 静态文件
        location / {
            try_files $uri $uri/ =404;
        }
    }
}
